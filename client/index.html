<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#DC2626" />

    <title>Doorline — Door-to-door canvassing software</title>
    <meta
      name="description"
      content="Doorline is the all-in-one door-to-door canvassing platform for campaigns and field organizers. Cut turf and build walk lists in the web console, knock with a GPS-stamped, offline-ready mobile app, and watch your canvass land on a live map."
    />
    <link rel="canonical" href="https://doorline.app/" />

    <!-- Open Graph (absolute URLs — social scrapers don't run JS) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Doorline" />
    <meta property="og:title" content="Doorline — Door-to-door canvassing software" />
    <meta
      property="og:description"
      content="The all-in-one door-to-door canvassing platform for campaigns and field organizers: turf cutting, walk lists, surveys, an offline-ready mobile field app, and a live canvassing map."
    />
    <meta property="og:url" content="https://doorline.app/" />
    <meta property="og:image" content="https://doorline.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Doorline — Door-to-door canvassing software" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Doorline — Door-to-door canvassing software" />
    <meta
      name="twitter:description"
      content="The all-in-one door-to-door canvassing platform for campaigns and field organizers."
    />
    <meta name="twitter:image" content="https://doorline.app/og-image.png" />
    <meta name="twitter:image:alt" content="Doorline — Door-to-door canvassing software" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Doorline",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web, iOS, Android",
        "url": "https://doorline.app/",
        "description": "All-in-one door-to-door canvassing platform for political campaigns and field organizers: turf cutting, walk lists, surveys, an offline-ready mobile field app, and a live canvassing map.",
        "audience": {
          "@type": "Audience",
          "audienceType": "Political campaigns, advocacy organizations, and community field organizers"
        }
      }
    </script>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
